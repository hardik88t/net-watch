name: GitHub Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_name:
        description: "Version name (ex: 0.2.0-beta.1)"
        required: true
        default: "0.2.0-beta.1"
      version_code:
        description: "Version code integer"
        required: true
        default: "2"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            VERSION_NAME="${GITHUB_REF_NAME#v}"
            VERSION_CODE="${GITHUB_RUN_NUMBER}"
          else
            VERSION_NAME="${{ github.event.inputs.version_name }}"
            VERSION_CODE="${{ github.event.inputs.version_code }}"
          fi
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          ./gradlew clean assembleDebug \
            -PNETWATCH_VERSION_NAME=${{ steps.version.outputs.name }} \
            -PNETWATCH_VERSION_CODE=${{ steps.version.outputs.code }}

      - name: Build release APK (unsigned)
        run: |
          ./gradlew assembleRelease \
            -PNETWATCH_VERSION_NAME=${{ steps.version.outputs.name }} \
            -PNETWATCH_VERSION_CODE=${{ steps.version.outputs.code }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ contains(steps.version.outputs.name, 'beta') }}
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release-unsigned.apk
