name: F-Droid Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  fdroid-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build unsigned release APK for F-Droid
        run: ./gradlew clean assembleRelease

      - name: Generate checksums
        run: |
          cd app/build/outputs/apk/release
          sha256sum app-release-unsigned.apk > app-release-unsigned.apk.sha256

      - name: Upload F-Droid artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netwatch-fdroid-apk
          path: |
            app/build/outputs/apk/release/app-release-unsigned.apk
            app/build/outputs/apk/release/app-release-unsigned.apk.sha256
            fdroid/metadata/com.netwatch.app.yml
