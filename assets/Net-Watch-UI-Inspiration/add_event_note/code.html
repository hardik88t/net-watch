<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Annotate Event - NetWatch</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#66ffdb",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f231e",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Top Navigation Bar -->
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between border-b border-slate-200 dark:border-primary/10">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center cursor-pointer hover:bg-slate-200 dark:hover:bg-primary/10 rounded-full justify-center transition-colors">
<span class="material-symbols-outlined">close</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Annotate Event</h2>
<div class="flex w-12 items-center justify-end">
<button class="text-primary text-base font-bold leading-normal tracking-[0.015em] shrink-0 hover:opacity-80">
                    Save
                </button>
</div>
</div>
<div class="max-w-2xl mx-auto w-full">
<!-- Event Overview Section -->
<div class="p-4 mt-4">
<div class="bg-slate-100 dark:bg-primary/5 rounded-xl p-4 border border-slate-200 dark:border-primary/10">
<div class="flex items-center gap-3 mb-4">
<div class="p-2 bg-primary/20 rounded-lg">
<span class="material-symbols-outlined text-primary">analytics</span>
</div>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">Event Details</h3>
</div>
<div class="space-y-3">
<div class="flex justify-between items-center gap-x-6 py-2 border-b border-slate-200 dark:border-primary/5">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-500 dark:text-primary/60">schedule</span>
<p class="text-slate-600 dark:text-primary/60 text-sm font-normal leading-normal">Time</p>
</div>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal text-right">Oct 24, 2023 - 14:32:05</p>
</div>
<div class="flex justify-between items-center gap-x-6 py-2 border-b border-slate-200 dark:border-primary/5">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-500 dark:text-primary/60">location_on</span>
<p class="text-slate-600 dark:text-primary/60 text-sm font-normal leading-normal">Location</p>
</div>
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal text-right">San Francisco, CA</p>
</div>
<div class="flex justify-between items-center gap-x-6 py-2">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-slate-500 dark:text-primary/60">signal_cellular_alt</span>
<p class="text-slate-600 dark:text-primary/60 text-sm font-normal leading-normal">Signal Strength</p>
</div>
<div class="text-right">
<p class="text-slate-900 dark:text-slate-100 text-sm font-medium leading-normal">-105 dBm</p>
<p class="text-orange-500 text-xs font-bold leading-tight">Poor Connection</p>
</div>
</div>
</div>
</div>
</div>
<!-- Map View Placeholder -->
<div class="px-4 py-2">
<div class="w-full h-40 rounded-xl overflow-hidden relative border border-slate-200 dark:border-primary/10">
<img alt="Map showing event location" class="w-full h-full object-cover opacity-80" data-alt="Topographic map with a location pin marker" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDmJ8e_CYIUYYhs0xwiGHeCL9lYg6ru9O7MF-g11V3IaNE8lIRx1deraZnoc3MXFlyYV4dvhEvqYcucStvLT8mLDfJVcWujHtdTUJbyU6r6GyYW9FbSmwery_tfRt2tByfXWjCkG3DY-u8cMZG7ydlBrV7aYUT8bMWV7xn5Q2qrobef3V_fY6baM-HQO02T6qPWF25wNisPi6xl1ZzD6WWdW4gQ67s-2X_nAGM3sPyGEXq2J4u6B4D-rmUxsvAuwO7A1lkz2DNWilej"/>
<div class="absolute inset-0 bg-primary/10 pointer-events-none"></div>
<div class="absolute inset-0 flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-4xl drop-shadow-lg">location_on</span>
</div>
</div>
</div>
<!-- Annotation Section -->
<div class="p-4">
<div class="flex flex-col gap-4">
<div class="flex items-center gap-3">
<div class="p-2 bg-primary/20 rounded-lg">
<span class="material-symbols-outlined text-primary">edit_note</span>
</div>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">Annotation</h3>
</div>
<label class="flex flex-col w-full">
<p class="text-slate-600 dark:text-primary/80 text-sm font-medium leading-normal pb-2 px-1">Add a note about the environment or conditions</p>
<textarea class="form-input flex w-full resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-200 dark:border-primary/20 bg-slate-50 dark:bg-primary/5 placeholder:text-slate-400 dark:placeholder:text-primary/30 p-4 text-base font-normal leading-relaxed min-h-[180px]" placeholder="e.g., In a basement, moving through elevator lobby, specific equipment interference..."></textarea>
</label>
<div class="flex gap-2 items-center px-1">
<span class="material-symbols-outlined text-slate-400 dark:text-primary/40 text-sm">info</span>
<p class="text-slate-500 dark:text-primary/40 text-xs">Notes are saved locally and synced to your central log.</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="p-4 mt-auto flex flex-col gap-3">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined font-bold">check_circle</span>
                    Save Annotation
                </button>
<button class="w-full bg-slate-200 dark:bg-primary/10 hover:bg-slate-300 dark:hover:bg-primary/20 text-slate-700 dark:text-slate-100 font-semibold py-4 rounded-xl transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">delete</span>
                    Discard Changes
                </button>
</div>
</div>
<div class="h-10 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
