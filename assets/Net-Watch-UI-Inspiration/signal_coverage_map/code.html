<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NetWatch - Coverage Map</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#66ffdb",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f231e",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f231e;
        }
        .map-container {
            position: relative;
            background: radial-gradient(circle at center, #1b3a32 0%, #0f231e 100%);
        }
        .heat-map-green {
            background: radial-gradient(circle, rgba(102, 255, 219, 0.4) 0%, rgba(102, 255, 219, 0) 70%);
        }
        .heat-map-red {
            background: radial-gradient(circle, rgba(255, 102, 102, 0.4) 0%, rgba(255, 102, 102, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-display min-h-screen flex flex-col overflow-hidden">
<!-- Header / Top Bar -->
<header class="flex items-center justify-between p-4 bg-background-light dark:bg-background-dark border-b border-primary/10">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">menu</span>
<h1 class="text-lg font-bold tracking-tight">NetWatch Map</h1>
</div>
<div class="flex items-center gap-2">
<button class="p-2 rounded-lg hover:bg-primary/10">
<span class="material-symbols-outlined">search</span>
</button>
<div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary text-sm">person</span>
</div>
</div>
</header>
<!-- Filter Chips -->
<div class="flex gap-2 p-3 overflow-x-auto no-scrollbar bg-background-light dark:bg-background-dark border-b border-primary/5">
<button class="flex items-center gap-2 shrink-0 px-4 py-1.5 rounded-full bg-primary text-background-dark text-sm font-semibold">
<span>5G</span>
<span class="material-symbols-outlined text-sm">expand_more</span>
</button>
<button class="flex items-center gap-2 shrink-0 px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 text-slate-100 text-sm font-medium">
<span>4G LTE</span>
<span class="material-symbols-outlined text-sm">expand_more</span>
</button>
<button class="flex items-center gap-2 shrink-0 px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 text-slate-100 text-sm font-medium">
<span>Wi-Fi</span>
<span class="material-symbols-outlined text-sm">expand_more</span>
</button>
<button class="flex items-center gap-2 shrink-0 px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 text-slate-100 text-sm font-medium">
<span>Outages</span>
<span class="material-symbols-outlined text-sm">expand_more</span>
</button>
</div>
<!-- Main Map Area -->
<main class="relative flex-1 map-container overflow-hidden">
<!-- Mock Map Background -->
<img class="absolute inset-0 w-full h-full object-cover opacity-40 mix-blend-luminosity" data-alt="Detailed dark mode street map of San Francisco area" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0BTDKHn-lETjMszRsjGjQkU8a4Rw-VUMzkioj94CLQcPQhKBreEvAXc1RQSuOefe0YtMFCn71JqggxSXykyKMQ3GBX4vn608_oqps_N6ohgVW_LUB7KSIPR4fhfmzMW3MEHEWe9zwNOc4x-82GIxS5zAXmP0Sdh_b-I9iht-pBthkft9TZyuR2gpIzMNzwLBs23goFv8P9xlnIvuLVEhn3fQGPhIQplTBmoi83_9JcJP3DowGX5ju6mZVD4to3i2syNaqHoh_eq40"/>
<!-- Heat Map Overlays (Abstract Representation) -->
<div class="absolute top-1/4 left-1/4 w-64 h-64 heat-map-green rounded-full blur-2xl"></div>
<div class="absolute bottom-1/3 right-1/4 w-80 h-80 heat-map-green rounded-full blur-3xl opacity-60"></div>
<div class="absolute top-1/2 left-1/2 w-48 h-48 heat-map-red rounded-full blur-2xl opacity-80"></div>
<div class="absolute bottom-20 left-10 w-32 h-32 heat-map-red rounded-full blur-xl opacity-50"></div>
<!-- Interactive Elements: Search Bar Overlay -->
<div class="absolute top-4 left-4 right-4 z-10">
<div class="flex items-center bg-background-dark/80 backdrop-blur-md border border-primary/20 rounded-xl p-1 shadow-2xl">
<span class="material-symbols-outlined px-3 text-slate-400">location_on</span>
<input class="bg-transparent border-none focus:ring-0 text-slate-100 flex-1 h-10 text-sm" placeholder="Search address or landmark..." type="text"/>
</div>
</div>
<!-- Pin Markers: Speed Tests & Outages -->
<!-- Speed Test Marker (Green) -->
<div class="absolute top-[40%] left-[30%] -translate-x-1/2 -translate-y-1/2 group cursor-pointer">
<div class="bg-primary p-1.5 rounded-full shadow-lg shadow-primary/40 relative">
<span class="material-symbols-outlined text-background-dark text-base block font-bold">speed</span>
<div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-background-dark border border-primary/30 px-2 py-1 rounded text-[10px] whitespace-nowrap hidden group-hover:block">
                    842 Mbps
                </div>
</div>
</div>
<!-- Outage Marker (Red) -->
<div class="absolute top-[55%] left-[55%] -translate-x-1/2 -translate-y-1/2 group cursor-pointer">
<div class="bg-red-500 p-1.5 rounded-full shadow-lg shadow-red-500/40 animate-pulse">
<span class="material-symbols-outlined text-white text-base block">error</span>
<div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 bg-background-dark border border-red-500/30 px-2 py-1 rounded text-[10px] whitespace-nowrap">
                    Absolute Zero Outage
                </div>
</div>
</div>
<!-- Floating Controls -->
<div class="absolute right-4 top-1/2 -translate-y-1/2 flex flex-col gap-2">
<button class="w-10 h-10 bg-background-dark/90 border border-primary/20 rounded-lg flex items-center justify-center text-primary shadow-xl">
<span class="material-symbols-outlined">add</span>
</button>
<button class="w-10 h-10 bg-background-dark/90 border border-primary/20 rounded-lg flex items-center justify-center text-primary shadow-xl">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="w-10 h-10 bg-background-dark/90 border border-primary/20 rounded-lg flex items-center justify-center text-primary shadow-xl mt-4">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<!-- Legend Overlay -->
<div class="absolute bottom-6 left-4 bg-background-dark/90 backdrop-blur-md border border-primary/10 rounded-lg p-3 text-[10px] text-slate-300">
<div class="flex items-center gap-2 mb-1.5">
<div class="w-3 h-3 rounded-full bg-primary"></div>
<span>Excellent Signal</span>
</div>
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-red-500"></div>
<span>Poor / No Signal</span>
</div>
</div>
<!-- Primary Action Button: Toggle Layers -->
<div class="absolute bottom-6 right-4">
<button class="flex items-center gap-3 bg-primary text-background-dark px-6 py-3 rounded-full font-bold shadow-2xl shadow-primary/30 transition-transform active:scale-95">
<span class="material-symbols-outlined">layers</span>
<span>Layers</span>
</button>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="flex justify-around items-center bg-background-dark border-t border-primary/10 pb-6 pt-3 px-2">
<a class="flex flex-col items-center gap-1 text-slate-500 transition-colors" href="#">
<span class="material-symbols-outlined">dashboard</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Dashboard</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary transition-colors" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">map</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Map</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 transition-colors" href="#">
<span class="material-symbols-outlined">speed</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Speed Test</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-500 transition-colors" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-medium uppercase tracking-wider">Settings</span>
</a>
</nav>
</body></html>
