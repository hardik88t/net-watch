<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Premium App Background Gradient (Subtle Vignette) -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#091C14" />
      <stop offset="100%" stop-color="#030906" />
    </radialGradient>

    <!-- Route Network Strength Gradient -->
    <linearGradient id="routeGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF3366" />
      <stop offset="40%" stop-color="#00D084" />
      <stop offset="100%" stop-color="#00FF66" />
    </linearGradient>

    <!-- Strong Signal Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Material Design Drop Shadow for Depth -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- ========================================== -->
  <!-- BACKGROUND LAYER (Full Bleed for Android)  -->
  <!-- ========================================== -->
  <g id="Background">
    <!-- Perfectly square to allow Android's launcher to apply the squircle/circle mask -->
    <rect width="512" height="512" fill="url(#bgGrad)" />
  </g>

  <!-- ========================================== -->
  <!-- FOREGROUND LAYER (Scaled for Safe Zone)    -->
  <!-- ========================================== -->
  <!-- Scaled by 0.7 to ensure all glow rings stay inside the 330px adaptive icon safe zone -->
  <g id="Foreground" transform="translate(256, 256) scale(0.7) translate(-256, -256)">
    
    <!-- Base Map Path (with Shadow for depth) -->
    <path d="M 120 392 Q 256 392 256 256 T 392 120" fill="none" stroke="#0E2419" stroke-width="16" stroke-linecap="round" filter="url(#dropShadow)" />

    <!-- Active Network Route (Dashed Map Line) -->
    <path d="M 120 392 Q 256 392 256 256 T 392 120" fill="none" stroke="url(#routeGrad)" stroke-width="6" stroke-linecap="round" stroke-dasharray="0 18" />

    <!-- ========================================== -->
    <!-- NODE 1: Weak Network Point (Red)           -->
    <!-- ========================================== -->
    <!-- Weak Coverage Area (Slightly boosted opacity for mobile screens) -->
    <circle cx="120" cy="392" r="24" fill="#FF3366" opacity="0.12" />
    <circle cx="120" cy="392" r="14" fill="#FF3366" opacity="0.20" />
    <!-- Node Point -->
    <circle cx="120" cy="392" r="6" fill="#FF3366" />
    <circle cx="120" cy="392" r="2" fill="#030906" />

    <!-- ========================================== -->
    <!-- NODE 2: Medium Network Point (Mid Green)   -->
    <!-- ========================================== -->
    <!-- Medium Coverage Area -->
    <circle cx="256" cy="256" r="42" fill="#00D084" opacity="0.12" />
    <circle cx="256" cy="256" r="24" fill="#00D084" opacity="0.20" />
    <!-- Node Point -->
    <circle cx="256" cy="256" r="8" fill="#00D084" />
    <circle cx="256" cy="256" r="3" fill="#030906" />

    <!-- ========================================== -->
    <!-- NODE 3: Strong Network Cluster (Green)     -->
    <!-- ========================================== -->
    <!-- Strong Wide Coverage Area -->
    <circle cx="392" cy="120" r="82" fill="#00FF66" opacity="0.06" />
    <circle cx="392" cy="120" r="54" fill="#00FF66" opacity="0.12" />
    <circle cx="392" cy="120" r="28" fill="#00FF66" opacity="0.20" />
    <!-- Node Point (Glowing) -->
    <circle cx="392" cy="120" r="12" fill="#00FF66" filter="url(#glow)" />
    <circle cx="392" cy="120" r="4" fill="#030906" />
    
  </g>
</svg>