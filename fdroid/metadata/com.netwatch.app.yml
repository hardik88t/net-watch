Summary: Open-source network diagnostics and coverage logging
Description: |
  NetWatch is a privacy-first Android diagnostics app that records network transitions,
  outages, anomalies, and on-demand speed tests with timestamped context.

  Highlights:
  - Lightweight passive monitoring
  - Triggered heavy diagnostics
  - Timeline and stats exports (CSV/JSON/report)
  - OpenStreetMap-based coverage map with optional offline tile caching

